name: Build CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            arch: x86_64
          - os: ubuntu-24.04-arm
            target: linux-arm64
            arch: aarch64
          - os: macos-latest
            target: macos-universal
            arch: universal2
          - os: windows-latest
            target: windows-x64
            arch: x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r cli/requirements.txt

      - name: Download ffmpeg (Linux x64)
        if: matrix.target == 'linux-x64'
        run: |
          mkdir -p cli/bin
          curl -L -o ffmpeg.tar.xz "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
          tar -xf ffmpeg.tar.xz
          cp ffmpeg-master-latest-linux64-gpl/bin/ffmpeg cli/bin/ffmpeg
          cp ffmpeg-master-latest-linux64-gpl/bin/ffprobe cli/bin/ffprobe
          chmod +x cli/bin/ffmpeg cli/bin/ffprobe
          cli/bin/ffmpeg -encoders | grep -E "libx264|libx265|libvpx|libsvtav1"
        working-directory: .

      - name: Download ffmpeg (Linux ARM64)
        if: matrix.target == 'linux-arm64'
        run: |
          mkdir -p cli/bin
          curl -L -o ffmpeg.tar.xz "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linuxarm64-gpl.tar.xz"
          tar -xf ffmpeg.tar.xz
          cp ffmpeg-master-latest-linuxarm64-gpl/bin/ffmpeg cli/bin/ffmpeg
          cp ffmpeg-master-latest-linuxarm64-gpl/bin/ffprobe cli/bin/ffprobe
          chmod +x cli/bin/ffmpeg cli/bin/ffprobe
          cli/bin/ffmpeg -encoders | grep -E "libx264|libx265|libvpx|libsvtav1"
        working-directory: .

      - name: Download ffmpeg (macOS)
        if: startsWith(matrix.target, 'macos')
        run: |
          mkdir -p cli/bin
          curl -L -o ffmpeg.zip "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip"
          unzip -j ffmpeg.zip -d cli/bin/
          curl -L -o ffprobe.zip "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip"
          unzip -j ffprobe.zip -d cli/bin/
          chmod +x cli/bin/ffmpeg cli/bin/ffprobe
          cli/bin/ffmpeg -encoders | grep -E "libx264|libx265|libvpx|libsvtav1"
        working-directory: .

      - name: Download ffmpeg (Windows)
        if: startsWith(matrix.target, 'windows')
        run: |
          mkdir -p cli/bin
          curl -L -o ffmpeg.zip "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          7z x ffmpeg.zip -y
          Copy-Item "ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe" -Destination "cli/bin/ffmpeg.exe" -Force
          Copy-Item "ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe" -Destination "cli/bin/ffprobe.exe" -Force
          cli/bin/ffmpeg.exe -encoders | Select-String -Pattern "libx264|libx265|libvpx|libsvtav1"
        shell: pwsh
        working-directory: .

      - name: Build with PyInstaller
        run: |
          cd cli
          python build/build.py --target ${{ matrix.target }} --package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-benchmark-${{ matrix.target }}
          path: cli/dist/video-benchmark-${{ matrix.target }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: video-benchmark-*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
