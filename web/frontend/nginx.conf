server {
    listen 80;
    server_name localhost;

    # Serve static frontend files
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend.
    # Uses a variable to defer DNS resolution to request time,
    # so nginx doesn't fail at startup if backend isn't ready yet.
    # The backend host is substituted at container startup via env var.
    location /api/ {
        resolver __NAMESERVER__ valid=10s;
        set $backend __BACKEND_HOST__;
        proxy_pass http://$backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
